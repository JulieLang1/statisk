<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FashionRus – Product</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html">Fashion<span>R</span>us</a>
        <nav class="nav">
          <a href="index.html">Categories</a>
          <a href="produktliste.html">Products</a>
          <a href="#">Seasons</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-top">
        <div class="breadcrumb">
          <a href="index.html">Home</a> › <a href="produktliste.html">Products</a> ›
          <strong id="crumbTitle">Produkt</strong>
        </div>
      </div>

      <section class="product-layout" aria-label="Produkt detaljer">
        <!-- Venstre: billede -->
        <div class="product-hero">
          <span id="saleBadge" class="badge sale" hidden></span>
          <span id="soldoutBadge" class="badge soldout" hidden>Sold out</span>

          <img id="productImg" src="" alt="" />
        </div>

        <!-- Højre: info + køb -->
        <div class="product-info">
          <h1 id="productTitle">Loading…</h1>
          <p class="small"><span id="brandName"></span> | <span id="articleType"></span></p>

          <div class="product-details">
            <p><strong>Brand:</strong> <span id="brand"></span></p>
            <p><strong>Type:</strong> <span id="type"></span></p>
            <p><strong>Category:</strong> <span id="category"></span></p>
            <p><strong>Season:</strong> <span id="season"></span></p>
            <p><strong>Usage:</strong> <span id="usage"></span></p>
          </div>

          <div class="price" id="priceBox"></div>
          <p id="soldoutText" class="soldout-text" hidden>Denne vare er udsolgt</p>

          <aside class="buy-box">
            <div class="select-row">
              <label class="small" for="size" style="min-width: 90px">Choose size</label>
              <select id="size" name="size">
                <option value="">Vælg</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
              </select>
            </div>

            <button id="addBtn" type="button">Add to basket</button>
          </aside>
        </div>
      </section>
    </main>

    <script src="js/produkt.js" defer></script>
  </body>
</html>
